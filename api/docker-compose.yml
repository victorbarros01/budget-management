services:
  database:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: meubanco
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    volumes:
      - app:/app
    container_name: node-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@database:5432/meubanco
    depends_on:
      - database

volumes:
  app:
  postgres_data: